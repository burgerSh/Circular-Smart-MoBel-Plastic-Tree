<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | Circular Smart MoBel Plastic Tree</title>

    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600&family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Prompt',sans-serif;
            background: linear-gradient(135deg,#eef7f2 0%,#fffbf0 100%);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-box{
            background:white;
            width:400px;
            padding:40px;
            border-radius:30px;
            box-shadow:0 15px 35px rgba(0,0,0,0.08);
            text-align:center;
        }

        .login-box h1{
            font-family:'Mali',cursive;
            color:#4a7c59;
            margin-bottom:10px;
        }

        .login-box p{
            color:#888;
            margin-bottom:25px;
        }

        .form-group{
            margin-bottom:18px;
            text-align:left;
        }

        .form-group label{
            display:block;
            margin-bottom:6px;
            color:#555;
        }

        .form-group input{
            width:100%;
            padding:12px;
            border:1px solid #ddd;
            border-radius:15px;
            font-size:15px;
        }

        .form-group input:focus{
            outline:none;
            border-color:#88b79a;
        }

        .btn-login{
            width:100%;
            border:none;
            padding:12px;
            border-radius:30px;
            background:#88b79a;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:.3s;
        }

        .btn-login:hover{
            background:#6a9c7d;
        }

        .back-home{
            display:inline-block;
            margin-top:20px;
            color:#6a9c7d;
            text-decoration:none;
        }

        .icon{
            font-size:50px;
            margin-bottom:10px;
        }
    </style>
</head>
<body>

    <div class="login-box">

        <div class="icon">🌱</div>

        <h1>Log In</h1>

        <p>เข้าสู่ระบบเพื่อเริ่มออกแบบ Packaging 3D</p>

        <form action="#" method="post">

    <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="example@email.com" required>
    </div>

    <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="********" required>
    </div>

    <button type="submit" class="btn-login">
        Log In 🔐
    </button>

</form>

<p style="margin-top:15px;">
    ยังไม่มีบัญชี?
    <a href="register.html"
       style="color:#6a9c7d;font-weight:600;text-decoration:none;">
        สมัครสมาชิก
    </a>
</p>

<a href="index.html" class="back-home">
    ← กลับหน้าหลัก
</a>
