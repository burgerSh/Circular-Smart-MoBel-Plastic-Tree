<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register</title>

<link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600&family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Prompt',sans-serif;
    background:linear-gradient(135deg,#eef7f2 0%,#fffbf0 100%);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.register-box{
    width:420px;
    background:white;
    padding:40px;
    border-radius:30px;
    box-shadow:0 15px 35px rgba(0,0,0,0.08);
}

h1{
    text-align:center;
    color:#4a7c59;
    font-family:'Mali',cursive;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#888;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:6px;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:15px;
    font-size:15px;
}

.error{
    color:#e57373;
    font-size:14px;
    margin-top:5px;
}

.success{
    color:#4CAF50;
    text-align:center;
    margin-top:15px;
}

.btn-register{
    width:100%;
    padding:12px;
    border:none;
    border-radius:30px;
    background:#88b79a;
    color:white;
    cursor:pointer;
    font-size:16px;
}

.btn-register:hover{
    background:#6a9c7d;
}

.back-login{
    text-align:center;
    margin-top:20px;
}

.back-login a{
    color:#6a9c7d;
    text-decoration:none;
}

</style>
</head>

<body>

<div class="register-box">

<h1>Register 🌱</h1>

<p class="subtitle">
สร้างบัญชีผู้ใช้งาน
</p>

<form id="registerForm">

<div class="form-group">
<label>Email</label>
<input type="text" id="email">
<div id="emailError" class="error"></div>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" id="password">
<div id="passwordError" class="error"></div>
</div>

<button type="submit" class="btn-register">
สมัครสมาชิก
</button>

<div id="successMessage" class="success"></div>

</form>

<div class="back-login">
<a href="login.html">
← กลับหน้า Login
</a>
</div>

</div>

<script>

const form = document.getElementById("registerForm");

form.addEventListener("submit", function(e){

    e.preventDefault();

    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value;

    let emailError = document.getElementById("emailError");
    let passwordError = document.getElementById("passwordError");
    let successMessage = document.getElementById("successMessage");

    emailError.textContent = "";
    passwordError.textContent = "";
    successMessage.textContent = "";

    let valid = true;

    const emailPattern =
    /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if(!emailPattern.test(email))
    {
        emailError.textContent =
        "Email ไม่ถูกต้อง";
        valid = false;
    }

    let errors = [];

    if(password.length < 8)
    {
        errors.push("ต้องมีอย่างน้อย 8 ตัวอักษร");
    }

    if(!/[A-Z]/.test(password))
    {
        errors.push("ต้องมีตัวพิมพ์ใหญ่");
    }

    if(!/[a-z]/.test(password))
    {
        errors.push("ต้องมีตัวพิมพ์เล็ก");
    }

    if(!/[0-9]/.test(password))
    {
        errors.push("ต้องมีตัวเลข");
    }

    if(!/[!@#$%^&*(),.?":{}|<>]/.test(password))
    {
        errors.push("ต้องมีอักขระพิเศษ");
    }

    if(errors.length > 0)
    {
        passwordError.textContent =
        "Password: " + errors.join(", ");
        valid = false;
    }

    if(valid)
    {
        successMessage.textContent =
        "สมัครสมาชิกสำเร็จ (Demo Mode)";
    }

});

</script>

</body>
</html>
